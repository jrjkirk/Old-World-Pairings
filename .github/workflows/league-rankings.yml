name: Weekly League Rankings Post
on:
  schedule:
    - cron: "0 19 * * 4"  # 19:00 UTC = 20:00 BST / 19:00 GMT on Thursdays
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python run_league_rankings_post.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DISCORD_LEAGUE_RANKINGS_WEBHOOK_URL: ${{ secrets.DISCORD_LEAGUE_RANKINGS_WEBHOOK_URL }}
